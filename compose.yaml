services:
  database:
    image: mysql:8.0
    container_name: vacations-database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: TempPass123!
      MYSQL_DATABASE: vacations_db
    ports:
      - "3307:3306"
    volumes:
      - ./Database:/docker-entrypoint-initdb.d

  backend:
    build: ./Backend
    container_name: vacations-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: TempPass123!
      DB_NAME: vacations_db
      JWT_SECRET: mySecretKey123
      OPENAI_API_KEY : ${OPENAI_API_KEY}
    depends_on:
      - database

  frontend:
    build: ./Frontend
    container_name: vacations-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend